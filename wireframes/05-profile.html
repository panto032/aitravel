<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelAI — Profil</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020205; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; min-height: 100vh; }
  .glow-1 { position: fixed; top: -10%; left: -10%; width: 60%; height: 60%; background: rgba(99,102,241,0.05); filter: blur(120px); border-radius: 50%; pointer-events: none; }
  .glow-2 { position: fixed; bottom: -10%; right: -10%; width: 50%; height: 50%; background: rgba(168,85,247,0.05); filter: blur(120px); border-radius: 50%; pointer-events: none; }
  .glass-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05); }
  .text-gradient { background: linear-gradient(135deg, #fff 40%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .container { max-width: 600px; margin: 0 auto; padding: 40px 24px 160px; position: relative; z-index: 1; }

  /* Back */
  .top-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
  .back-btn { width: 48px; height: 48px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 20px; cursor: pointer; text-decoration: none; }
  .top-bar h2 { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #64748b; }

  /* Avatar section */
  .avatar-section { text-align: center; margin-bottom: 40px; }
  .avatar { width: 96px; height: 96px; border-radius: 32px; background: linear-gradient(135deg, #4f46e5, #7c3aed); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 36px; font-weight: 900; color: white; border: 2px solid rgba(255,255,255,0.15); }
  .avatar-name { font-size: 24px; font-weight: 900; font-style: italic; margin-bottom: 4px; }
  .avatar-email { font-size: 13px; color: #64748b; font-weight: 500; margin-bottom: 12px; }
  .plan-badge { display: inline-block; padding: 6px 20px; border-radius: 14px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: #10b981; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 40px; }
  .stat-card { border-radius: 24px; padding: 20px; text-align: center; }
  .stat-val { font-size: 28px; font-weight: 900; font-style: italic; color: #818cf8; margin-bottom: 4px; }
  .stat-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; color: #475569; }

  /* Section */
  .section { margin-bottom: 24px; }
  .section-title { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #64748b; margin-bottom: 12px; }

  /* Form card */
  .form-card { border-radius: 28px; padding: 24px; margin-bottom: 16px; }
  .form-row { margin-bottom: 16px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px 16px; color: #f1f5f9; font-size: 14px; font-weight: 600; outline: none; transition: border-color 0.3s; }
  .form-input:focus { border-color: rgba(99,102,241,0.4); }
  .form-input::placeholder { color: #334155; }

  .btn { padding: 14px 32px; border-radius: 20px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; border: none; cursor: pointer; transition: all 0.3s; }
  .btn-primary { background: #4f46e5; color: white; box-shadow: 0 8px 24px rgba(99,102,241,0.2); }
  .btn-primary:hover { background: #4338ca; }
  .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
  .btn-outline:hover { border-color: rgba(255,255,255,0.2); color: #f1f5f9; }
  .btn-danger { background: transparent; border: 1px solid rgba(244,63,94,0.2); color: #f43f5e; }
  .btn-danger:hover { background: rgba(244,63,94,0.1); }
  .btn-block { width: 100%; text-align: center; }

  /* Menu items */
  .menu-card { border-radius: 28px; overflow: hidden; }
  .menu-item { display: flex; align-items: center; gap: 16px; padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: background 0.3s; }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: rgba(255,255,255,0.02); }
  .menu-icon { font-size: 20px; color: #64748b; width: 32px; text-align: center; }
  .menu-label { flex: 1; font-size: 14px; font-weight: 700; }
  .menu-arrow { color: #334155; font-size: 16px; }
  .menu-value { font-size: 12px; color: #64748b; font-weight: 600; }

  /* Theme toggle */
  .theme-row { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; }
  .theme-toggle { width: 52px; height: 28px; border-radius: 14px; background: rgba(99,102,241,0.3); position: relative; cursor: pointer; border: 1px solid rgba(99,102,241,0.4); }
  .theme-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 10px; background: #818cf8; transition: transform 0.3s; }
  .theme-toggle.light::after { transform: translateX(24px); }

  /* Offline cache info */
  .cache-info { border-radius: 20px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .cache-icon { font-size: 20px; }
  .cache-text { font-size: 12px; color: #64748b; font-weight: 600; }
  .cache-val { color: #818cf8; font-weight: 800; }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); min-width: 500px; height: 80px; background: rgba(2,6,23,0.9); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; padding: 0 32px; z-index: 200; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
  .nav-item { color: #475569; padding: 12px; cursor: pointer; font-size: 22px; }
  .nav-item.active { color: #6366f1; }
  .nav-center { width: 64px; height: 64px; border-radius: 24px; background: linear-gradient(135deg, #4f46e5, #7c3aed); display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; margin-top: -48px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 40px rgba(99,102,241,0.4); cursor: pointer; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: 1fr; }
    .bottom-nav { min-width: auto; width: 92%; }
  }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="container">
  <!-- Top bar -->
  <div class="top-bar">
    <a href="02-dashboard.html" class="back-btn">←</a>
    <h2>Moj profil</h2>
  </div>

  <!-- Avatar -->
  <div class="avatar-section">
    <div class="avatar">MJ</div>
    <div class="avatar-name text-gradient">Marko Jovanović</div>
    <div class="avatar-email">marko@email.com</div>
    <span class="plan-badge">Free Plan &bull; 7/10 pretraga</span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="glass-card stat-card">
      <div class="stat-val">23</div>
      <div class="stat-label">Pretrage</div>
    </div>
    <div class="glass-card stat-card">
      <div class="stat-val">8</div>
      <div class="stat-label">Analize</div>
    </div>
    <div class="glass-card stat-card">
      <div class="stat-val">5</div>
      <div class="stat-label">Sačuvano</div>
    </div>
  </div>

  <!-- Profile form -->
  <div class="section">
    <div class="section-title">Podaci naloga</div>
    <div class="glass-card form-card">
      <div class="form-row">
        <label class="form-label">Ime</label>
        <input class="form-input" type="text" value="Marko Jovanović">
      </div>
      <div class="form-row">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" value="marko@email.com">
      </div>
      <div class="form-row" style="text-align: right;">
        <button class="btn btn-primary">Sačuvaj</button>
      </div>
    </div>
  </div>

  <!-- Password -->
  <div class="section">
    <div class="section-title">Promjena lozinke</div>
    <div class="glass-card form-card">
      <div class="form-row">
        <label class="form-label">Trenutna lozinka</label>
        <input class="form-input" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
      </div>
      <div class="form-row">
        <label class="form-label">Nova lozinka</label>
        <input class="form-input" type="password" placeholder="Min. 8 karaktera">
      </div>
      <div class="form-row" style="text-align: right;">
        <button class="btn btn-outline">Promijeni</button>
      </div>
    </div>
  </div>

  <!-- Settings menu -->
  <div class="section">
    <div class="section-title">Podešavanja</div>
    <div class="glass-card menu-card">
      <div class="menu-item theme-row">
        <span class="menu-icon">&#x1F319;</span>
        <span class="menu-label">Tamna tema</span>
        <div class="theme-toggle"></div>
      </div>
      <div class="menu-item">
        <span class="menu-icon">&#x1F4BE;</span>
        <span class="menu-label">Offline keš</span>
        <span class="menu-value">12 analiza &bull; 4.2 MB</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="menu-icon">&#x1F4B3;</span>
        <span class="menu-label">Premium plan</span>
        <span class="menu-value">€4.99/mj</span>
        <span class="menu-arrow">›</span>
      </div>
    </div>
  </div>

  <!-- Logout -->
  <button class="btn btn-danger btn-block" style="margin-top: 16px;">Odjavi se</button>

  <!-- App info -->
  <div style="text-align: center; margin-top: 32px;">
    <p style="font-size: 11px; color: #334155; font-weight: 600;">TravelAI v1.0</p>
    <p style="font-size: 10px; color: #1e293b; margin-top: 4px;">IMPULSE &bull; part of IMPULS TECH DOO</p>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <span class="nav-item">&#x1F3E0;</span>
  <span class="nav-item">&#x1F30D;</span>
  <div class="nav-center">&#x26A1;</div>
  <span class="nav-item">&#x1F554;</span>
  <span class="nav-item active">&#x1F464;</span>
</div>

</body>
</html>
