<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelAI — Prijava</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020205; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .glow-1 { position: fixed; top: -10%; left: -10%; width: 60%; height: 60%; background: rgba(99,102,241,0.05); filter: blur(120px); border-radius: 50%; pointer-events: none; }
  .glow-2 { position: fixed; bottom: -10%; right: -10%; width: 50%; height: 50%; background: rgba(168,85,247,0.05); filter: blur(120px); border-radius: 50%; pointer-events: none; }
  .glass-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05); }
  .text-gradient { background: linear-gradient(135deg, #fff 40%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .auth-container { width: 100%; max-width: 440px; padding: 24px; position: relative; z-index: 1; }

  .logo { font-size: 28px; font-weight: 900; font-style: italic; letter-spacing: -0.05em; color: white; text-align: center; margin-bottom: 48px; }
  .logo span { color: #6366f1; text-decoration: underline; text-underline-offset: 4px; }

  .auth-card { border-radius: 45px; padding: 48px 40px; }

  .auth-title { font-size: 28px; font-weight: 900; font-style: italic; text-align: center; margin-bottom: 8px; }
  .auth-sub { font-size: 13px; color: #64748b; font-weight: 500; text-align: center; margin-bottom: 36px; }

  /* Tabs */
  .auth-tabs { display: flex; border-radius: 16px; overflow: hidden; margin-bottom: 32px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
  .auth-tab { flex: 1; padding: 14px; text-align: center; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; color: #475569; cursor: pointer; transition: all 0.3s; }
  .auth-tab.active { background: rgba(99,102,241,0.12); color: #818cf8; }

  /* Form */
  .form-row { margin-bottom: 20px; }
  .form-label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; color: #f1f5f9; font-size: 15px; font-weight: 600; outline: none; transition: border-color 0.3s; }
  .form-input:focus { border-color: rgba(99,102,241,0.4); }
  .form-input::placeholder { color: #1e293b; }

  .btn-submit { width: 100%; padding: 18px; border-radius: 20px; background: #4f46e5; color: white; font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(99,102,241,0.2); margin-top: 8px; transition: all 0.2s; }
  .btn-submit:hover { background: #4338ca; }
  .btn-submit:active { transform: scale(0.98); }

  .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
  .divider span { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #334155; }

  .btn-social { width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #94a3b8; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: border-color 0.3s; margin-bottom: 12px; }
  .btn-social:hover { border-color: rgba(255,255,255,0.15); }

  .forgot { display: block; text-align: center; font-size: 12px; color: #6366f1; font-weight: 700; margin-top: 24px; text-decoration: none; }
  .forgot:hover { text-decoration: underline; }

  .auth-footer { text-align: center; margin-top: 32px; font-size: 11px; color: #475569; }
  .auth-footer a { color: #6366f1; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="auth-container">
  <div class="logo">Travel<span>AI</span></div>

  <div class="glass-card auth-card">
    <div class="auth-title text-gradient">Dobrodošao</div>
    <div class="auth-sub">Prijavi se ili kreiraj besplatan nalog</div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active">Prijava</div>
      <div class="auth-tab">Registracija</div>
    </div>

    <!-- Login form -->
    <div class="form-row">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" placeholder="tvojmail@email.com">
    </div>
    <div class="form-row">
      <label class="form-label">Lozinka</label>
      <input class="form-input" type="password" placeholder="••••••••">
    </div>
    <button class="btn-submit">Prijavi se</button>

    <a href="#" class="forgot">Zaboravio si lozinku?</a>

    <div class="divider"><span>ili</span></div>

    <button class="btn-social">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M18.17 8.37H17.5V8.33H10V11.67H14.71C14.02 13.61 12.17 15 10 15C7.24 15 5 12.76 5 10C5 7.24 7.24 5 10 5C11.27 5 12.42 5.47 13.32 6.26L15.68 3.89C14.14 2.46 12.18 1.67 10 1.67C5.4 1.67 1.67 5.4 1.67 10C1.67 14.6 5.4 18.33 10 18.33C14.6 18.33 18.33 14.6 18.33 10C18.33 9.44 18.28 8.9 18.17 8.37Z" fill="#FFC107"/><path d="M2.63 6.12L5.36 8.13C6.12 6.29 7.9 5 10 5C11.27 5 12.42 5.47 13.32 6.26L15.68 3.89C14.14 2.46 12.18 1.67 10 1.67C6.95 1.67 4.31 3.47 2.63 6.12Z" fill="#FF3D00"/><path d="M10 18.33C12.13 18.33 14.04 17.59 15.55 16.23L13 14C12.14 14.64 11.1 15 10 15C7.84 15 6 13.62 5.3 11.69L2.58 13.78C4.24 16.51 6.9 18.33 10 18.33Z" fill="#4CAF50"/><path d="M18.17 8.37H17.5V8.33H10V11.67H14.71C14.38 12.59 13.78 13.38 13 13.95L15.55 16.18C15.37 16.35 18.33 14.17 18.33 10C18.33 9.44 18.28 8.9 18.17 8.37Z" fill="#1976D2"/></svg>
      Nastavi sa Google
    </button>

    <button class="btn-social">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 0C4.48 0 0 4.48 0 10C0 14.42 2.87 18.17 6.84 19.49C7.34 19.58 7.52 19.27 7.52 19.01V17.13C4.73 17.73 4.14 15.84 4.14 15.84C3.68 14.71 3.03 14.4 3.03 14.4C2.12 13.79 3.1 13.8 3.1 13.8C4.1 13.87 4.63 14.82 4.63 14.82C5.52 16.3 6.97 15.83 7.55 15.57C7.63 14.93 7.89 14.48 8.17 14.23C5.95 13.97 3.62 13.12 3.62 9.34C3.62 8.27 4.01 7.39 4.65 6.7C4.55 6.45 4.2 5.44 4.74 4.08C4.74 4.08 5.58 3.81 7.5 5.09C8.29 4.87 9.15 4.76 10 4.75C10.85 4.76 11.71 4.87 12.5 5.09C14.42 3.81 15.26 4.08 15.26 4.08C15.8 5.44 15.45 6.45 15.35 6.7C15.99 7.39 16.38 8.27 16.38 9.34C16.38 13.13 14.04 13.97 11.81 14.22C12.17 14.53 12.5 15.14 12.5 16.08V19.01C12.5 19.28 12.68 19.59 13.18 19.49C17.14 18.16 20 14.42 20 10C20 4.48 15.52 0 10 0Z" fill="#94a3b8"/></svg>
      Nastavi sa GitHub
    </button>
  </div>

  <div class="auth-footer">
    Kreiranjem naloga prihvataš <a href="#">Uslove korišćenja</a> i <a href="#">Politiku privatnosti</a>
  </div>
</div>

</body>
</html>
